# Kubeflow Notebook with GPU profile.
#
# The annotation must be on BOTH:
#   1. The Notebook CR metadata (so the notebook controller propagates it
#      to the StatefulSet pod template)
#   2. spec.template.metadata.annotations (belt and suspenders — ensures
#      the annotation reaches the pod regardless of controller behavior)
#
# The WTO webhook intercepts the pod created by the StatefulSet and injects
# DRA GPU claims, resources, and placement. The notebook gets GPU access
# via nvidia-smi inside the Jupyter environment.
#
# Prerequisites:
#   - RHOAI or ODH installed with Workbenches component enabled
#   - A notebook image with CUDA support
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: gpu-notebook
  namespace: wto-examples
  annotations:
    notebooks.opendatahub.io/inject-oauth: "false"
    opendatahub.io/image-display-name: "Minimal GPU"
    workload-tuning.io/profile-name: gpu-t4-node
  labels:
    opendatahub.io/dashboard: "true"
spec:
  template:
    metadata:
      annotations:
        workload-tuning.io/profile-name: gpu-t4-node
    spec:
      containers:
        - name: gpu-notebook
          image: "registry.redhat.io/rhoai/odh-workbench-jupyter-minimal-cuda-py312-rhel9@sha256:a46c0694e3dc8e6dcc5bba1de4e2556b1efb58f82a761adcf43aa3dc755c1f07"
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          env:
            - name: NOTEBOOK_ARGS
              value: "--NotebookApp.token='' --NotebookApp.password=''"
      serviceAccountName: default
