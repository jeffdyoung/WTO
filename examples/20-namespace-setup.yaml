# Namespace setup for WTO examples.
# Creates a namespace with the required labels, a ResourceQuota for DRA devices,
# and a Kueue LocalQueue for Queue placement.
#
# Prerequisites:
#   - WTO deployed (webhook registered)
#   - Kueue operator installed with a ClusterQueue named "gpu-cluster-queue"
#   - GPU nodes with DRA driver and DeviceClass "gpu.nvidia.com"
apiVersion: v1
kind: Namespace
metadata:
  name: wto-examples
  labels:
    workload-template.io/enabled: "true"
    gpu-tier: standard
    kueue.openshift.io/managed: "true"
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: gpu-quota
  namespace: wto-examples
spec:
  hard:
    gpu.nvidia.com.deviceclass.resource.k8s.io/devices: "2"
    requests.cpu: "32"
    requests.memory: 128Gi
---
# LocalQueue — connects this namespace to the cluster-wide GPU queue.
# Requires a ClusterQueue named "gpu-cluster-queue" to exist.
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: gpu-queue
  namespace: wto-examples
spec:
  clusterQueue: gpu-cluster-queue
