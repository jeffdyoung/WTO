# CPU-only profile — no GPU, no placement constraints.
# The scheduler places the pod based on resource availability alone.
apiVersion: workload-template.io/v1alpha1
kind: WorkloadProfile
metadata:
  name: cpu-small
  namespace: wto-examples
  annotations:
    workload-template.io/display-name: "Small CPU"
    workload-template.io/description: "2 CPUs and 4Gi memory, no GPU"
spec:
  defaults:
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 4Gi
