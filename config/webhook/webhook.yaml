apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: aaa-wto
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
webhooks:
- name: pod-mutator.workload-template.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Fail
  matchPolicy: Equivalent
  namespaceSelector:
    matchLabels:
      workload-template.io/enabled: "true"
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
    scope: Namespaced
  clientConfig:
    service:
      name: wto-webhook
      namespace: wto-system
      path: /mutate-pods
      port: 443
