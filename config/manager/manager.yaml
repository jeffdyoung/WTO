apiVersion: v1
kind: Namespace
metadata:
  name: wto-system
  labels:
    app.kubernetes.io/name: wto
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wto
  namespace: wto-system
  labels:
    app.kubernetes.io/name: wto
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wto
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wto
    spec:
      serviceAccountName: wto
      containers:
      - name: manager
        image: quay.io/jeffdyoung/wto:latest
        imagePullPolicy: Always
        args:
        - --cert-dir=/tmp/tls
        - --metrics-addr=:8080
        - --webhook-port=9443
        ports:
        - containerPort: 9443
          name: webhook
        - containerPort: 8080
          name: metrics
        volumeMounts:
        - name: tls
          mountPath: /tmp/tls
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: tls
        secret:
          secretName: wto-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: wto-webhook
  namespace: wto-system
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: wto-webhook-tls
  labels:
    app.kubernetes.io/name: wto
spec:
  selector:
    app.kubernetes.io/name: wto
  ports:
  - port: 443
    targetPort: 9443
