apiVersion: workload-template.io/v1alpha1
kind: WorkloadProfile
metadata:
  name: gpu-t4
  annotations:
    workload-template.io/display-name: "Tesla T4 (1 GPU)"
    workload-template.io/description: "1x Tesla T4 GPU with 1 CPU and 2Gi memory"
spec:
  defaults:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  deviceClaims:
  - name: gpu
    request:
      name: gpu
      exactly:
        deviceClassName: gpu.nvidia.com
        count: 1
        selectors:
        - cel:
            expression: 'device.attributes["gpu.nvidia.com"].productName == "Tesla T4"'
  placement:
    type: Node
    node:
      nodeSelector:
        nvidia.com/gpu.present: "true"
