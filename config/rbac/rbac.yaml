apiVersion: v1
kind: ServiceAccount
metadata:
  name: wto
  namespace: wto-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wto
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["workload-template.io"]
  resources: ["workloadprofiletemplates"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["workload-template.io"]
  resources: ["workloadprofiletemplates/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["workload-template.io"]
  resources: ["workloadprofiles"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["workload-template.io"]
  resources: ["workloadprofiles/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["workload-template.io"]
  resources: ["workloadprofiles/finalizers"]
  verbs: ["update"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaimtemplates"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["resource.k8s.io"]
  resources: ["deviceclasses"]
  verbs: ["get", "list", "watch"]
# WorkloadTypeConfig lifecycle
- apiGroups: ["workload-template.io"]
  resources: ["workloadtypeconfigs"]
  verbs: ["get", "list", "watch", "create"]
- apiGroups: ["workload-template.io"]
  resources: ["workloadtypeconfigs/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["workload-template.io"]
  resources: ["workloadtypeconfigs/finalizers"]
  verbs: ["update"]
# CRD existence checks for dynamic watch registration
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
# Default workload types for annotation propagation
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["kubeflow.org"]
  resources: ["notebooks", "pytorchjobs"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
# Aggregate ClusterRole for custom workload types.
# Admins create a ClusterRole with the label below to grant WTO
# permissions on their custom CRD without modifying the operator manifests.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wto-custom-workloads
  labels:
    workload-template.io/aggregate-to-wto: "true"
aggregationRule:
  clusterRoleSelectors:
  - matchLabels:
      workload-template.io/aggregate-to-wto: "true"
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wto
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wto
subjects:
- kind: ServiceAccount
  name: wto
  namespace: wto-system
